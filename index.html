<!doctype html>
<html lang="fr">
  <head>
    <title>Visualization</title>
    <meta charset="utf-8" />
    <style>
      body {
        min-height: 100vh;
        min-width: 100vw;
      }
      .legend {
        width: 15%;
        position: absolute;
        top: 0;
        left: 0;
        padding: 1em;

        background-color: white;
      }
      #graph {
        height: 100vh;
        width: 100vw;
      }

      .node {
        cursor: pointer;
      }

      .node:hover {
        stroke: #000;
        stroke-width: 1.5px;
      }

      .node--root {
        stroke: #777;
        stroke-width: 2px;
      }

      .node--leaf {
        fill: white;
        stroke: #777;
        stroke-width: 1px;
      }

      .label {
        font:
          14px 'Helvetica Neue',
          Helvetica,
          Arial,
          sans-serif;
        text-anchor: middle;
        fill: black;
        font-weight: 600;
        text-shadow:
          0 1px 0 #fff,
          1px 0 0 #fff,
          -1px 0 0 #fff,
          0 -1px 0 #fff;
      }

      .label,
      .node--root,
      .node--leaf {
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="legend">
      <p>La taille des cercles correspond à la quantité de code associée.</p>
      <p>La couleur indique le nombre de modifications</p>
    </div>
    <div id="graph"></div>
    <script src="d3/d3.min.js"></script>
    <script>
      var graphContainer = document.getElementById('graph');
      var maxHeight = graphContainer.clientHeight;
      var maxWidth = graphContainer.clientWidth;

      var translateX = maxWidth / 4;

      var margin = 10,
        outerDiameter = maxHeight,
        innerDiameter = outerDiameter - margin - margin;

      var x = d3.scale.linear().range([0, innerDiameter]);

      var y = d3.scale.linear().range([0, innerDiameter]);

      var color = d3.scale
        .linear()
        .domain([-1, 5])
        .range(['hsl(185,60%,99%)', 'hsl(187,40%,70%)'])
        .interpolate(d3.interpolateHcl);

      var pack = d3.layout
        .pack()
        .padding(2)
        .size([innerDiameter, innerDiameter])
        .value(function (d) {
          return d.size;
        });

      var svg = d3
        .select('#graph')
        .append('svg')
        .attr('width', maxWidth)
        .attr('height', maxHeight)
        .attr('viewBox', `0 0 ${maxWidth} ${maxHeight}`)
        .append('g')
        .attr('transform', 'translate(' + translateX + ',' + margin + ')');

      d3.json('report.json', function (error, root) {
        var focus = root,
          nodes = pack.nodes(root);

        svg
          .append('g')
          .selectAll('circle')
          .data(nodes)
          .enter()
          .append('circle')
          .attr('class', function (d) {
            return d.parent
              ? d.children
                ? 'node'
                : 'node node--leaf'
              : 'node node--root';
          })
          .attr('transform', function (d) {
            return 'translate(' + d.x + ',' + d.y + ')';
          })
          .attr('r', function (d) {
            return d.r;
          })
          .style('fill', function (d) {
            return d.weight > 0.0
              ? 'darkred'
              : d.children
                ? color(d.depth)
                : 'WhiteSmoke';
          })
          .style('fill-opacity', function (d) {
            return d.weight;
          })
          .on('click', function (d) {
            return zoom(focus == d ? root : d);
          });

        svg
          .append('g')
          .selectAll('text')
          .data(nodes)
          .enter()
          .append('text')
          .attr('class', 'label')
          .attr('transform', function (d) {
            return 'translate(' + d.x + ',' + d.y + ')';
          })
          .style('fill-opacity', function (d) {
            return d.parent === root ? 1 : 0;
          })
          .style('display', function (d) {
            return d.parent === root ? null : 'none';
          })
          .text(function (d) {
            return d.name;
          });

        d3.select(window).on('click', function () {
          zoom(root);
        });

        function zoom(d, i) {
          var focus0 = focus;
          focus = d;

          var k = innerDiameter / d.r / 2;
          x.domain([d.x - d.r, d.x + d.r]);
          y.domain([d.y - d.r, d.y + d.r]);
          d3.event.stopPropagation();

          var transition = d3
            .selectAll('text,circle')
            .transition()
            .duration(d3.event.altKey ? 7500 : 750)
            .attr('transform', function (d) {
              return 'translate(' + x(d.x) + ',' + y(d.y) + ')';
            });

          transition.filter('circle').attr('r', function (d) {
            return k * d.r;
          });

          transition
            .filter('text')
            .filter(function (d) {
              return d.parent === focus || d.parent === focus0;
            })
            .style('fill-opacity', function (d) {
              return d.parent === focus ? 1 : 0;
            })
            .each('start', function (d) {
              if (d.parent === focus) this.style.display = 'inline';
            })
            .each('end', function (d) {
              if (d.parent !== focus) this.style.display = 'none';
            });
        }
      });

      d3.select(self.frameElement).style('height', outerDiameter + 'px');
    </script>
  </body>
</html>
